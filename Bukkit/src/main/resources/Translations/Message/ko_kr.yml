wand:
  give: "<green>도구를 받았습니다.</green>"
  add: "<white>점 추가: <red>{x}</red><gray>,</gray> <aqua>{z}</aqua> (<gray>{count}</gray>)</white>"
  remove: "<white>마지막 점을 제거했습니다. (<gray>{count}</gray>)</white>"
  clear: "<white>선택한 모든 점을 초기화했습니다.</white>"
  invalid-item: "<red>잘못된 도구 아이템 설정입니다.</red>"
  intersect: "<red>선이 교차합니다! 다른 위치를 선택해주세요.</red>"
  mode:
    toggle: "<white>선택 모드가 <white>{mode}</white>(으)로 전환되었습니다.</white>"
    free: "<green>자유</green>"
    square: "<yellow>사각형</yellow>"
  square:
    first: "<white>첫 번째 지점을 선택했습니다.</white> <red>{x}</red><gray>,</gray> <aqua>{z}</aqua>"
    second: "<white>두 번째 지점을 선택했습니다.</white> <red>{x}</red><gray>,</gray> <aqua>{z}</aqua>"
region:
  create: "<green>지역 '<white>{region}</white>'을(를) 생성했습니다. (점: <white>{points}</white>개, 면적: <white>{area}</white>㎡)</green>"
  remove: "<white>지역 '<white>{region}</white>'을(를) 제거했습니다.</white>"
  exists: "<red>이미 존재하는 지역 이름입니다.</red>"
  not-found: "<red>지역을 찾을 수 없습니다.</red>"
  world-not-found: "<red>월드를 찾을 수 없습니다.</red>"
  teleport: "<green>지역 '<white>{region}</white>'(으)로 이동했습니다.</green>"
  zero-area: "<red>지역의 면적이 0입니다. x 또는 z가 동일한 선분/점 형태는 생성할 수 없습니다.</red>"
  list:
    empty: "<white>등록된 지역이 없습니다.</white>"
    header: "<gradient:#FFD700:#FFA500>===== 지역 목록 (<white>{count}</white>개) =====</gradient>"
    item: " <gray>▪</gray> <white>{name}</white> <gray>-</gray> <white>{world}</white> <gray>(점: <white>{points}</white>개, 면적: <white>{area}</white>㎡)</gray>"
  info:
    header: "<gradient:#FFD700:#FFA500>===== 지역 정보: <white>{region}</white> =====</gradient>"
    world: " <gray>▪</gray> <white>월드:</white> <white>{world}</white>"
    server: " <gray>▪</gray> <white>서버:</white> <white>{server}</white>"
    points: " <gray>▪</gray> <white>점 개수:</white> <white>{points}</white>개"
    area: " <gray>▪</gray> <white>면적:</white> <white>{area}</white>㎡"
    perimeter: " <gray>▪</gray> <white>둘레:</white> <white>{perimeter}</white>블록"
    center: " <gray>▪</gray> <white>중심:</white> <white>({x}, {z})</white>"
    flags: " <gray>▪</gray> <white>플래그:</white> <white>{flags}</white>"
  flag:
    add: "<green>지역 '<white>{region}</white>'에 플래그 '<white>{flag}</white>'를 추가했습니다.</green>"
    remove: "<white>지역 '<white>{region}</white>'에서 플래그 '<white>{flag}</white>'를 제거했습니다.</white>"
    unknown: "<red>알 수 없는 플래그: {flag}</red>"
    list:
      empty: "<white>지역 '<white>{region}</white>'에 설정된 플래그가 없습니다.</white>"
      header: "<gradient:#FFD700:#FFA500>===== 지역 플래그: <white>{region}</white> =====</gradient>"
      item: " <gray>▪</gray> <white>{name}</white> <gray>({key})</gray>"
particle:
  toggle: "<white>파티클 표시: {status}</white>"
  on: "<green>켜짐</green>"
  off: "<red>꺼짐</red>"
